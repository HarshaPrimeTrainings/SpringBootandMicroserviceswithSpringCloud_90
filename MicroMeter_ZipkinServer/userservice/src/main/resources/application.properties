spring.application.name=userservice

spring.datasource.url=jdbc:mysql://localhost:3306/spring_boot_microservices_90
spring.datasource.username=root
spring.datasource.password=admin

# Automatically loaded by SpringData based on JDBC url
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQlDialect
spring.jpa.hibernate.ddl-auto=update

spring.jackson.mapper.sort-properties-alphabetically=false

spring.jpa.show-sql=true

orderservice.url=http://ORDERSERVICE/order

eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.instance-info-replication-interval-seconds=10

management.endpoints.web.exposure.include=*

logging.level.org.springframework.web=DEBUG
logging.pattern.level=%5p[${spring.application.name},%X{traceId},%X{spanId}]

management.tracing.sampling.probability=1

management.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans

